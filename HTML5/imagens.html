        img -> imagem
        src -> source (caminho da imagem)
        alt -> alternative (texto alternativo)
        tipos de imagens: jpg, png, gif, svg, webp
    -->

        <img src="/IMG/praia2.jpg"
        alt="Imagem da praia da escadaria em Araial do cabo"
        width="300"
        title="Praia da escadaria em Araial do cabo">
        <figcaption><u><i>Praia da escadaria em Araial do cabo</u></i></figcaption>
    </figure>
