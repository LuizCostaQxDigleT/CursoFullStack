<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tabelas</title>
</head>
<body>

    <h1>Tabelas</h1>

    <!--
        table -> tabela
        tr -> table row -> linha da tabela
        td -> table data -> célula da tabela
        th -> table header -> cabeçalho da tabela
    -->
    <!--
    Não utilizar o border, apenas para fins de estudo,
    usaremos o CSS para estilizar a tabela, mas por enquanto vamos usar o border para visualizar melhor a tabela.
    -->
    
    
    <table border="6">
        <tr>
            <th>Ano</th>
            <th>Piloto</th>
        </tr>
        <tr>
            <td>2020  </td>
            <td>Lewis Hamilton
            </td>
    

    <!--
        colspan -> extensão da coluna
        rowspan -> extensão da linha
    -->

    <tr>
        <td colspan="2">2026</td>
    </tr>
    

    </table>

</body>
</html>
